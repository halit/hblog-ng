<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&amp;display=swap');
      
      .text-glow { filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.9)); }
      .hud-glow { filter: drop-shadow(0 0 5px rgba(0, 229, 255, 0.5)); }
      .offense-glow { filter: drop-shadow(0 0 8px rgba(255, 0, 85, 0.6)); }
      .defense-glow { filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.6)); }
      .misc-glow { filter: drop-shadow(0 0 8px rgba(107, 114, 128, 0.6)); }
    </style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020406;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020406;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="spotlight" cx="30%" cy="50%" r="60%" fx="30%" fy="50%">
        <stop offset="0%" style="stop-color:#1a253a;stop-opacity:0.7" />
        <stop offset="100%" style="stop-color:#0a0f14;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0055;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:1" />
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    
    <pattern id="scanlines" height="6" width="100%" patternUnits="userSpaceOnUse">
        <rect width="100%" height="1" fill="#000000" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Base Background --><rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#spotlight)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Dynamic Particles --><g opacity="0.6">
    {{PARTICLES}}
  </g>

  <!-- Connecting Lines (Static Decoration) --><g stroke="#ffffff" stroke-width="0.5" opacity="0.1">
    <line x1="756" y1="208" x2="738" y2="281" />
    <line x1="738" y1="281" x2="761" y2="340" />
    <line x1="761" y1="340" x2="712" y2="427" />
    <line x1="1016" y1="113" x2="1069" y2="111" />
  </g>
  
  <!-- HUD Corners --><g class="hud-glow" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.5">
      <path d="M 40 40 L 20 40 L 20 100" />
      <path d="M 1160 40 L 1180 40 L 1180 100" stroke="#ff0055" />
      <path d="M 40 590 L 20 590 L 20 530" />
      <path d="M 1160 590 L 1180 590 L 1180 530" stroke="#ff0055" />
  </g>
  
  <!-- Main Content Area --><g transform="translate(100, 130)">
    
    <!-- Type Label Pill --><g transform="translate(0, -10)">
        <rect x="0" y="0" width="160" height="32" rx="16" fill="#1a1f26" stroke="url(#accent)" stroke-width="2" class="hud-glow" opacity="0.9"/>
        <text x="80" y="22" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="bold" fill="url(#accent)" text-anchor="middle" letter-spacing="2">{{TYPE_LABEL}}</text>
    </g>
    
    <!-- Glitch Title (Multi-layer for effect) --><g font-family="'JetBrains Mono', monospace" font-size="64" font-weight="800" style="text-transform: uppercase;">
       <!-- Cyan Channel --><text x="-2" y="110" fill="#00e5ff" opacity="0.5">{{TITLE_GROUP}}</text>
       <!-- Red Channel --><text x="2" y="110" fill="#ff0055" opacity="0.5">{{TITLE_GROUP}}</text>
       <!-- White Main Channel --><text x="0" y="110" fill="#ffffff" class="text-glow">{{TITLE_GROUP}}</text>
    </g>
    
    <!-- Description --><g font-family="'JetBrains Mono', monospace" font-size="24" fill="#9ca3af" font-weight="400">
        <text x="0" y="{{DESCRIPTION_Y}}">{{DESCRIPTION_GROUP}}</text>
    </g>
    
  </g>
  
  <!-- Spectrum Meter (Dynamic New Design) --><g transform="translate(80, 555)">
      <!-- Dynamic Bars Container (380px width total approx) -->
      {{SPECTRUM_BARS}}
  </g>
  
  <!-- Branding --><g transform="translate(1120, 580)" text-anchor="end">
    <text font-family="'JetBrains Mono', monospace" font-size="26" font-weight="bold" letter-spacing="-1">
      <tspan fill="#ffffff">halit</tspan>
      <tspan fill="#ff0055" class="hud-glow">.</tspan>
      <tspan fill="#ffffff">alptekin</tspan>
      <tspan fill="#00e5ff" class="hud-glow">.</tspan>
      <tspan fill="#ffffff">im</tspan>
    </text>
  </g>

  <!-- Scanlines --><rect width="100%" height="100%" fill="url(#scanlines)" style="pointer-events: none;" />
  
</svg>
